; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp12e


[env:esp12e]
platform = espressif8266
board = esp12e
framework = arduino


lib_deps = 
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/ESPAsyncTCP.git
    ipdotsetaf/ESPAsyncHTTPUpdateServer@^3.0.0
    https://github.com/me-no-dev/ESPAsyncTCP
    https://github.com/DanielKnoop/ESPAsyncUDP
    bblanchon/ArduinoJson @ ^6.19.4
    https://github.com/Oxi75/homee-api-esp32

build_flags = 
    -DARDUINOJSON_POSITIVE_EXPONENTIATION_THRESHOLD=1e9
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH
    -DNDEBUG                  ; Deaktiviere Debug-Ausgaben für mehr Speicher
    -DOTA_USE_FLASH_BUFFER=1  ; Buffer im Flash statt RAM für OTA
    -D ARDUINOJSON_USE_LONG_LONG=0  ; Reduziert den ArduinoJSON-Speicherverbrauch


upload_speed = 921600
monitor_speed = 74880

# Hier neue Einstellungen für mehr Flash und weniger LittleFS
board_build.f_cpu = 160000000L  ; CPU auf 160MHz einstellen für bessere Performance
; Optimierungen für den Speicherverbrauch
board_build.ldscript = eagle.flash.4m2m.ld  ; 4MB Flash mit 2MB für Filesystem


